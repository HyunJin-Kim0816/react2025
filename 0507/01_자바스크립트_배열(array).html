<body>
  <h2>01_자바스크립트_배열(array)</h2>
  <p>자바스크립트 객체는 키(key)와 값(value)로 구성되어 있다</p>
  <p>배열 데이터는 1개 또느 ㄴ여러개의 쌍으로 구성된다.</p>
  <p>값(value)은 숫자, 문자열 뿐만 아니라 또 다른 객체(object)를 넣을 수 있다.</p>
 
  <script>
    const car = new Object();
    car.type='현대자동차';
    car.model='소나타';
    car.color='흰색';

    //객체를 호출하여 내용 출력하기
    document.write('내가 선택한 자동차 회사는' + car.type + '이고 모델명은' + car.model+ '이며 색상은' + car.color +'입니다.');

    const car2 ={ //객체를 사용하는 두번째 방법
      type:'현대자동차',
      model:'소나타',
      color:'흰색'
    }
    document.write('<p>내가 선택한 자동차 회사는' + car2.type + '이고 모델명은' + car2.model+ '이며 색상은' + car2.color +'입니다.</p>');


  </script>
